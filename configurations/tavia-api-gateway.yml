server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - "X-Tenant-ID"
                  - "X-Tavia-Gateway"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: tenant-service
              uri: lb://tavia-tenant-service
              predicates:
                - Path=/api/v1/tenants/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: order-service
              uri: lb://tavia-order-service
              predicates:
                - Path=/api/v1/orders/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: inventory-service
              uri: lb://tavia-inventory-service
              predicates:
                - Path=/api/v1/inventory/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: ai-service
              uri: lb://tavia-ai-service
              predicates:
                - Path=/api/v1/ai/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: crm-service
              uri: lb://tavia-crm-service
              predicates:
                - Path=/api/v1/crm/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: context-service
              uri: lb://tavia-context-service
              predicates:
                - Path=/api/v1/context/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: catalog-service
              uri: lb://tavia-catalog-service
              predicates:
                - Path=/api/v1/catalog/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000

            - id: iot-service
              uri: lb://tavia-iot-service
              predicates:
                - Path=/api/v1/iot/**
              metadata:
                connect-timeout: 5000
                response-timeout: 5000
