<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TAVIA Mission Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#070b14;--bg-secondary:#0d1321;--bg-card:#111827;
  --bg-card-hover:#1a2340;--border:#1e2a42;--border-active:#2d3f66;
  --text-primary:#e8edf5;--text-secondary:#8896ab;--text-muted:#3d4f6e;
  --green:#00e676;--red:#ff1744;--cyan:#00bcd4;--amber:#ffc107;
  --purple:#b388ff;--blue:#448aff;--pink:#ff4081;
  --font-sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --font-mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
}
html{font-size:14px}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}

/* Header */
.header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:1rem}
.logo{font-size:1.35rem;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:3px}
.header-right{display:flex;align-items:center;gap:1.25rem}
.status-pill{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;border-radius:999px;font-size:0.75rem;font-weight:600;letter-spacing:0.5px}
.status-pill .dot{width:8px;height:8px;border-radius:50%}
.pill-sse{background:rgba(0,188,212,0.1);border:1px solid rgba(0,188,212,0.3);color:var(--cyan)}
.pill-sse .dot{background:var(--cyan)}
.pill-sse.disconnected{background:rgba(255,23,68,0.1);border-color:rgba(255,23,68,0.3);color:var(--red)}
.pill-sse.disconnected .dot{background:var(--red)}
.pill-sim{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green)}
.pill-sim .dot{background:var(--green)}
.pill-sim.stopped{background:rgba(255,193,7,0.1);border-color:rgba(255,193,7,0.3);color:var(--amber)}
.pill-sim.stopped .dot{background:var(--amber)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
.pill-sim:not(.stopped) .dot{animation:pulse-dot 1.5s infinite}

/* Controls */
.controls{padding:0.75rem 1.5rem;display:flex;align-items:center;gap:0.75rem;border-bottom:1px solid var(--border);background:var(--bg-secondary)}
.btn{padding:0.45rem 1rem;border:1px solid var(--border);border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:var(--font-sans);letter-spacing:0.5px}
.btn:active{transform:scale(0.97)}
.btn-start{background:rgba(0,230,118,0.12);color:var(--green);border-color:rgba(0,230,118,0.3)}
.btn-start:hover{background:rgba(0,230,118,0.22)}
.btn-stop{background:rgba(255,23,68,0.12);color:var(--red);border-color:rgba(255,23,68,0.3)}
.btn-stop:hover{background:rgba(255,23,68,0.22)}
.btn-refresh{background:rgba(0,188,212,0.12);color:var(--cyan);border-color:rgba(0,188,212,0.3)}
.btn-refresh:hover{background:rgba(0,188,212,0.22)}
.controls-spacer{flex:1}
.cycle-tag{font-family:var(--font-mono);font-size:0.75rem;color:var(--text-muted)}

/* Stats Row */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.75rem;padding:1rem 1.5rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:0.85rem 1rem;text-align:center;transition:border-color 0.2s}
.stat-card:hover{border-color:var(--border-active)}
.stat-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:0.35rem}
.stat-value{font-family:var(--font-mono);font-size:1.65rem;font-weight:700}
.stat-card.orders .stat-value{color:var(--green)}
.stat-card.telemetry .stat-value{color:var(--cyan)}
.stat-card.failures .stat-value{color:var(--red)}
.stat-card.cycles .stat-value{color:var(--purple)}
.stat-card.tenants .stat-value{color:var(--blue)}

/* Section Headers */
.section-header{padding:0.6rem 1.5rem 0.25rem;display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:3px;color:var(--text-muted);font-weight:700}

/* City Grid */
.city-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.6rem;padding:0.5rem 1.5rem}
.city-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.85rem;transition:all 0.25s;position:relative;overflow:hidden}
.city-card:hover{border-color:var(--border-active);background:var(--bg-card-hover)}
.city-card.has-errors{border-color:rgba(255,23,68,0.35)}
.city-name{font-size:0.8rem;font-weight:700;margin-bottom:0.5rem;color:var(--text-primary)}
.city-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0.3rem}
.city-metric{text-align:center}
.city-metric-label{font-size:0.55rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.city-metric-value{font-family:var(--font-mono);font-size:1rem;font-weight:700}
.city-metric.m-orders .city-metric-value{color:var(--green)}
.city-metric.m-telemetry .city-metric-value{color:var(--cyan)}
.city-metric.m-errors .city-metric-value{color:var(--red)}
@keyframes city-flash{0%{box-shadow:inset 0 0 0 1px var(--green),0 0 12px rgba(0,230,118,0.15)}100%{box-shadow:none}}
@keyframes city-flash-err{0%{box-shadow:inset 0 0 0 1px var(--red),0 0 12px rgba(255,23,68,0.2)}100%{box-shadow:none}}
.city-card.flash-order{animation:city-flash 0.6s ease-out}
.city-card.flash-error{animation:city-flash-err 0.8s ease-out}

/* Tenant Ribbon */
.tenant-ribbon{padding:0.5rem 1.5rem;display:flex;flex-wrap:wrap;gap:0.4rem}
.tenant-tag{font-size:0.65rem;padding:0.2rem 0.55rem;border-radius:4px;background:rgba(68,138,255,0.1);border:1px solid rgba(68,138,255,0.25);color:var(--blue);font-weight:500;white-space:nowrap}
.tenant-tag .tag-city{color:var(--text-muted);margin-left:0.3rem}

/* Event Feed */
.feed-container{margin:0.5rem 1.5rem 1.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;height:320px}
.feed-header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.85rem;border-bottom:1px solid var(--border);flex-shrink:0}
.feed-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);font-weight:700}
.feed-controls{display:flex;gap:0.5rem}
.feed-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:0.2rem 0.5rem;border-radius:4px;font-size:0.65rem;cursor:pointer;font-family:var(--font-sans)}
.feed-btn:hover{border-color:var(--border-active);color:var(--text-primary)}
.feed-btn.active{border-color:var(--amber);color:var(--amber)}
.feed-scroll{flex:1;overflow-y:auto;padding:0.35rem 0;font-family:var(--font-mono);font-size:0.72rem;line-height:1.65}
.feed-scroll::-webkit-scrollbar{width:5px}
.feed-scroll::-webkit-scrollbar-track{background:transparent}
.feed-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.feed-entry{padding:0.15rem 0.85rem;display:flex;gap:0.6rem;border-left:2px solid transparent;transition:background 0.1s}
.feed-entry:hover{background:rgba(255,255,255,0.02)}
.feed-ts{color:var(--text-muted);flex-shrink:0;min-width:70px}
.feed-type{font-weight:700;flex-shrink:0;min-width:65px;text-transform:uppercase;font-size:0.65rem;padding-top:1px}
.feed-city{color:var(--text-secondary);flex-shrink:0;min-width:75px}
.feed-tenant{color:var(--blue);flex-shrink:0;min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-detail{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feed-entry.type-ORDER_PLACED{border-left-color:var(--green)}
.feed-entry.type-ORDER_PLACED .feed-type{color:var(--green)}
.feed-entry.type-ORDER_FAILED{border-left-color:var(--red)}
.feed-entry.type-ORDER_FAILED .feed-type{color:var(--red)}
.feed-entry.type-TELEMETRY_SENT{border-left-color:var(--cyan)}
.feed-entry.type-TELEMETRY_SENT .feed-type{color:var(--cyan)}
.feed-entry.type-MACHINE_ERROR{border-left-color:var(--pink);background:rgba(255,23,68,0.04)}
.feed-entry.type-MACHINE_ERROR .feed-type{color:var(--pink)}
.feed-entry.type-CYCLE_START,.feed-entry.type-CYCLE_VOLUME{border-left-color:var(--purple)}
.feed-entry.type-CYCLE_START .feed-type,.feed-entry.type-CYCLE_VOLUME .feed-type{color:var(--purple)}
.feed-entry.type-SIMULATOR_STARTED{border-left-color:var(--green);background:rgba(0,230,118,0.04)}
.feed-entry.type-SIMULATOR_STARTED .feed-type{color:var(--green)}
.feed-entry.type-SIMULATOR_STOPPED{border-left-color:var(--amber);background:rgba(255,193,7,0.04)}
.feed-entry.type-SIMULATOR_STOPPED .feed-type{color:var(--amber)}
.feed-entry.type-CACHE_REFRESHED{border-left-color:var(--blue)}
.feed-entry.type-CACHE_REFRESHED .feed-type{color:var(--blue)}
@keyframes feed-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.feed-entry.new{animation:feed-in 0.2s ease-out}

/* Empty State */
.feed-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-family:var(--font-sans);font-size:0.85rem;letter-spacing:1px}

/* Responsive */
@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .city-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .city-grid{grid-template-columns:repeat(2,1fr)}
  .feed-tenant{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">TAVIA MISSION CONTROL</div>
      <div class="logo-sub">Traffic Simulator Observatory</div>
    </div>
  </div>
  <div class="header-right">
    <div id="pillSse" class="status-pill pill-sse disconnected">
      <span class="dot"></span><span id="sseLabel">DISCONNECTED</span>
    </div>
    <div id="pillSim" class="status-pill pill-sim stopped">
      <span class="dot"></span><span id="simLabel">STOPPED</span>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-start" onclick="controlAction('start')">START</button>
  <button class="btn btn-stop" onclick="controlAction('stop')">STOP</button>
  <button class="btn btn-refresh" onclick="controlAction('refresh-cache')">REFRESH CACHE</button>
  <div class="controls-spacer"></div>
  <span id="cycleMeta" class="cycle-tag"></span>
</div>

<div class="stats-row">
  <div class="stat-card cycles"><div class="stat-label">Cycles</div><div class="stat-value" id="statCycles">0</div></div>
  <div class="stat-card orders"><div class="stat-label">Orders</div><div class="stat-value" id="statOrders">0</div></div>
  <div class="stat-card telemetry"><div class="stat-label">Telemetry</div><div class="stat-value" id="statTelemetry">0</div></div>
  <div class="stat-card failures"><div class="stat-label">Failures</div><div class="stat-value" id="statFailures">0</div></div>
  <div class="stat-card tenants"><div class="stat-label">Tenants</div><div class="stat-value" id="statTenants">0</div></div>
</div>

<div class="section-header">
  <span class="section-title">City Traffic Distribution</span>
</div>
<div class="city-grid" id="cityGrid"></div>

<div class="section-header">
  <span class="section-title">Tenant Bindings</span>
</div>
<div class="tenant-ribbon" id="tenantRibbon">
  <span style="color:var(--text-muted);font-size:0.7rem">Awaiting cache...</span>
</div>

<div class="section-header">
  <span class="section-title">Live Event Feed</span>
</div>
<div class="feed-container">
  <div class="feed-header">
    <span class="feed-title" id="feedCount">0 events</span>
    <div class="feed-controls">
      <button class="feed-btn" id="btnPause" onclick="togglePause()">PAUSE</button>
      <button class="feed-btn" onclick="clearFeed()">CLEAR</button>
    </div>
  </div>
  <div class="feed-scroll" id="feedScroll">
    <div class="feed-empty" id="feedEmpty">Waiting for events...</div>
  </div>
</div>

<script>
const CITIES = [
  'ISTANBUL','ANKARA','IZMIR','BURSA','ANTALYA','ADANA',
  'KONYA','SANLIURFA','GAZIANTEP','KOCAELI','ESKISEHIR','ISPARTA'
];
const CITY_DISPLAY = {
  ISTANBUL:'Istanbul',ANKARA:'Ankara',IZMIR:'Izmir',BURSA:'Bursa',
  ANTALYA:'Antalya',ADANA:'Adana',KONYA:'Konya',SANLIURFA:'Sanliurfa',
  GAZIANTEP:'Gaziantep',KOCAELI:'Kocaeli',ESKISEHIR:'Eskisehir',ISPARTA:'Isparta'
};

let cityData = {};
let eventSource = null;
let paused = false;
let eventCount = 0;
let simRunning = false;
const MAX_FEED = 400;

CITIES.forEach(c => { cityData[c] = {orders:0,telemetry:0,errors:0}; });

function initCityGrid() {
  const grid = document.getElementById('cityGrid');
  grid.innerHTML = CITIES.map(c => `
    <div class="city-card" id="city-${c}">
      <div class="city-name">${CITY_DISPLAY[c]}</div>
      <div class="city-metrics">
        <div class="city-metric m-orders">
          <div class="city-metric-label">Orders</div>
          <div class="city-metric-value" id="co-${c}">0</div>
        </div>
        <div class="city-metric m-telemetry">
          <div class="city-metric-label">Telemetry</div>
          <div class="city-metric-value" id="ct-${c}">0</div>
        </div>
        <div class="city-metric m-errors">
          <div class="city-metric-label">Errors</div>
          <div class="city-metric-value" id="ce-${c}">0</div>
        </div>
      </div>
    </div>
  `).join('');
}

function updateCityCard(city) {
  const d = cityData[city];
  if (!d) return;
  const co = document.getElementById('co-'+city);
  const ct = document.getElementById('ct-'+city);
  const ce = document.getElementById('ce-'+city);
  if (co) co.textContent = d.orders;
  if (ct) ct.textContent = d.telemetry;
  if (ce) ce.textContent = d.errors;
  const card = document.getElementById('city-'+city);
  if (card) {
    card.classList.toggle('has-errors', d.errors > 0);
  }
}

function flashCity(city, type) {
  const card = document.getElementById('city-'+city);
  if (!card) return;
  const cls = type === 'MACHINE_ERROR' ? 'flash-error' : 'flash-order';
  card.classList.remove(cls);
  void card.offsetWidth;
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 800);
}

function updateStats(data) {
  if (data.cycles !== undefined) document.getElementById('statCycles').textContent = data.cycles;
  if (data.ordersPlaced !== undefined) document.getElementById('statOrders').textContent = data.ordersPlaced;
  if (data.telemetrySent !== undefined) document.getElementById('statTelemetry').textContent = data.telemetrySent;
  if (data.failures !== undefined) document.getElementById('statFailures').textContent = data.failures;
  if (data.cachedTenants !== undefined) document.getElementById('statTenants').textContent = data.cachedTenants;
  if (data.running !== undefined) {
    simRunning = data.running;
    updateSimPill();
  }
}

function updateSimPill() {
  const pill = document.getElementById('pillSim');
  const label = document.getElementById('simLabel');
  if (simRunning) {
    pill.classList.remove('stopped');
    label.textContent = 'RUNNING';
  } else {
    pill.classList.add('stopped');
    label.textContent = 'STOPPED';
  }
}

function updateSsePill(connected) {
  const pill = document.getElementById('pillSse');
  const label = document.getElementById('sseLabel');
  if (connected) {
    pill.classList.remove('disconnected');
    label.textContent = 'CONNECTED';
  } else {
    pill.classList.add('disconnected');
    label.textContent = 'DISCONNECTED';
  }
}

function updateTenantRibbon(tenants) {
  const ribbon = document.getElementById('tenantRibbon');
  if (!tenants || tenants.length === 0) {
    ribbon.innerHTML = '<span style="color:var(--text-muted);font-size:0.7rem">No tenants cached</span>';
    return;
  }
  ribbon.innerHTML = tenants.map(t =>
    `<span class="tenant-tag">${t.name}<span class="tag-city">${CITY_DISPLAY[t.city] || t.city}</span></span>`
  ).join('');
}

function appendFeedEntry(event) {
  if (paused) return;
  const scroll = document.getElementById('feedScroll');
  const empty = document.getElementById('feedEmpty');
  if (empty) empty.remove();

  const ts = event.timestamp ? new Date(event.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:1}) : '';
  const city = event.city ? (CITY_DISPLAY[event.city.toUpperCase()] || event.city) : '';
  const tenant = event.tenantName || '';
  const detail = event.detail || '';
  const type = event.type || 'INFO';

  const row = document.createElement('div');
  row.className = 'feed-entry new type-' + type;
  row.innerHTML = `<span class="feed-ts">${ts}</span><span class="feed-type">${type.replace('_',' ')}</span><span class="feed-city">${city}</span><span class="feed-tenant">${tenant}</span><span class="feed-detail">${detail}</span>`;

  scroll.prepend(row);
  eventCount++;
  document.getElementById('feedCount').textContent = eventCount + ' events';

  while (scroll.children.length > MAX_FEED) {
    scroll.removeChild(scroll.lastChild);
  }
  setTimeout(() => row.classList.remove('new'), 250);
}

function clearFeed() {
  const scroll = document.getElementById('feedScroll');
  scroll.innerHTML = '<div class="feed-empty" id="feedEmpty">Feed cleared</div>';
  eventCount = 0;
  document.getElementById('feedCount').textContent = '0 events';
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  btn.textContent = paused ? 'RESUME' : 'PAUSE';
  btn.classList.toggle('active', paused);
}

function handleEvent(type, data) {
  const city = data.city ? data.city.toUpperCase() : null;

  switch (type) {
    case 'ORDER_PLACED':
      if (city && cityData[city]) { cityData[city].orders++; updateCityCard(city); flashCity(city, type); }
      break;
    case 'TELEMETRY_SENT':
      if (city && cityData[city]) { cityData[city].telemetry++; updateCityCard(city); }
      break;
    case 'MACHINE_ERROR':
      if (city && cityData[city]) { cityData[city].errors++; updateCityCard(city); flashCity(city, type); }
      break;
    case 'SIMULATOR_STARTED':
      simRunning = true; updateSimPill(); break;
    case 'SIMULATOR_STOPPED':
      simRunning = false; updateSimPill(); break;
    case 'ORDER_FAILED':
      if (city && cityData[city]) { cityData[city].errors++; updateCityCard(city); }
      break;
  }

  if (type !== 'HEARTBEAT' && type !== 'CONNECTED') {
    appendFeedEntry(data);
  }
}

function connectSSE() {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource('/api/v1/dashboard/events');

  const EVENTS = ['ORDER_PLACED','ORDER_FAILED','TELEMETRY_SENT','MACHINE_ERROR',
    'CYCLE_START','CYCLE_VOLUME','CYCLE_FAILED','SIMULATOR_STARTED','SIMULATOR_STOPPED',
    'CACHE_REFRESHED','CONNECTED','HEARTBEAT'];

  EVENTS.forEach(ev => {
    eventSource.addEventListener(ev, (e) => {
      try {
        const data = JSON.parse(e.data);
        handleEvent(ev, data);
      } catch(err) { console.warn('Parse error:', err); }
    });
  });

  eventSource.onopen = () => updateSsePill(true);
  eventSource.onerror = () => {
    updateSsePill(false);
    eventSource.close();
    setTimeout(connectSSE, 3000);
  };
}

async function fetchSnapshot() {
  try {
    const res = await fetch('/api/v1/dashboard/snapshot');
    const snap = await res.json();
    if (snap.simulator) updateStats(snap.simulator);
    if (snap.cities) {
      Object.entries(snap.cities).forEach(([c, d]) => {
        cityData[c] = {orders: d.orders||0, telemetry: d.telemetry||0, errors: d.errors||0};
        updateCityCard(c);
      });
    }
    if (snap.tenants) updateTenantRibbon(snap.tenants);
  } catch(e) { console.warn('Snapshot fetch failed:', e); }
}

async function controlAction(action) {
  const method = action === 'status' ? 'GET' : 'POST';
  try {
    const res = await fetch('/api/v1/simulator/' + action, {method});
    const data = await res.json();
    if (data.running !== undefined) { simRunning = data.running; updateSimPill(); }
    if (action !== 'refresh-cache') updateStats(data);
    setTimeout(fetchSnapshot, 1500);
  } catch(e) { console.warn('Control action failed:', e); }
}

setInterval(fetchSnapshot, 10000);

initCityGrid();
fetchSnapshot();
connectSSE();
</script>
</body>
</html>
