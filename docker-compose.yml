services:
  # 1. POSTGRESQL (Tüm servislerin ortak veritabanı sunucusu)
  postgres:
    image: postgres:15-alpine
    container_name: tavia-postgres
    restart: always
    mem_limit: 256m
    command: ["postgres", "-c", "shared_buffers=64MB"]
    environment:
      POSTGRES_USER: tavia_user
      POSTGRES_PASSWORD: tavia_password
      POSTGRES_DB: tavia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. PGADMIN (Veritabanını görsel olarak yönetmek için arayüz)
  pgadmin:
    image: dpage/pgadmin4
    container_name: tavia-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tavia.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # 3. ZOOKEEPER (Kafka'nın çalışması için gereken orkestra şefi)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: tavia-zookeeper
    mem_limit: 128m
    environment:
      KAFKA_OPTS: "-Xmx64m -Xms64m"
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 4. APACHE KAFKA (Mikroservislerin birbiriyle asenkron haberleştiği mesaj kuyruğu)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: tavia-kafka
    mem_limit: 512m
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 5. REDIS (Feature Store ve Caching için In-Memory Veritabanı)
  redis:
    image: redis:7-alpine
    container_name: tavia-redis
    mem_limit: 64m
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
